name: Build and Release Plugin

on:
  push:
    tags:
      - 'plugin-*-v*'
  workflow_dispatch:
    inputs:
      plugin_name:
        description: Plugin slug, for example `parakeet`
        required: true
        type: string
      plugin_version:
        description: Plugin version, for example `1.2.1`
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    concurrency:
      group: plugin-release-${{ github.event_name == 'workflow_dispatch' && format('{0}-v{1}', inputs.plugin_name, inputs.plugin_version) || github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Parse tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLUGIN_NAME="${{ inputs.plugin_name }}"
            PLUGIN_VERSION="${{ inputs.plugin_version }}"
            TAG="plugin-${PLUGIN_NAME}-v${PLUGIN_VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            # Extract plugin name and version from tag: plugin-qwen3-v1.0.0
            PLUGIN_NAME=$(echo "$TAG" | sed 's/^plugin-//' | sed 's/-v[0-9].*//')
            PLUGIN_VERSION=$(echo "$TAG" | sed 's/.*-v//')
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "PLUGIN_NAME=$PLUGIN_NAME" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> $GITHUB_ENV
          echo "Plugin: $PLUGIN_NAME, Version: $PLUGIN_VERSION, Tag: $TAG"

      - name: Resolve target name
        run: |
          # Map plugin name to Xcode target
          case "$PLUGIN_NAME" in
            qwen3) TARGET="Qwen3Plugin" ;;
            linear) TARGET="LinearPlugin" ;;
            webhook) TARGET="WebhookPlugin" ;;
            groq) TARGET="GroqPlugin" ;;
            openai) TARGET="OpenAIPlugin" ;;
            gemini) TARGET="GeminiPlugin" ;;
            whisperkit) TARGET="WhisperKitPlugin" ;;
            parakeet) TARGET="ParakeetPlugin" ;;
            gemma4) TARGET="Gemma4Plugin" ;;
            speechanalyzer) TARGET="SpeechAnalyzerPlugin" ;;
            openai-compatible) TARGET="OpenAICompatiblePlugin" ;;
            voxtral) TARGET="VoxtralPlugin" ;;
            deepgram) TARGET="DeepgramPlugin" ;;
            assemblyai) TARGET="AssemblyAIPlugin" ;;
            obsidian) TARGET="ObsidianPlugin" ;;
            script) TARGET="ScriptPlugin" ;;
            livetranscript) TARGET="LiveTranscriptPlugin" ;;
            granite) TARGET="GranitePlugin" ;;
            cloudflare-asr) TARGET="CloudflareASRPlugin" ;;
            file-memory) TARGET="FileMemoryPlugin" ;;
            openai-vector-memory) TARGET="OpenAIVectorMemoryPlugin" ;;
            fireworks) TARGET="FireworksPlugin" ;;
            gladia) TARGET="GladiaPlugin" ;;
            elevenlabs) TARGET="ElevenLabsPlugin" ;;
            google-cloud-stt) TARGET="GoogleCloudSTTPlugin" ;;
            claude) TARGET="ClaudePlugin" ;;
            cerebras) TARGET="CerebrasPlugin" ;;
            openrouter) TARGET="OpenRouterPlugin" ;;
            soniox) TARGET="SonioxPlugin" ;;
            cohere) TARGET="CoherePlugin" ;;
            speechmatics) TARGET="SpeechmaticsPlugin" ;;
            system-tts) TARGET="SystemTTSPlugin" ;;
            filler-words) TARGET="FillerWordsPlugin" ;;
            *) echo "Unknown plugin: $PLUGIN_NAME" && exit 1 ;;
          esac
          # Set deployment target and Swift embedding per plugin
          # All plugins use Xcode 26.2 (mlx-audio-swift requires Swift 6.2 for package resolution,
          # and workspace-state.json v7 from Xcode 26.2 is incompatible with Xcode 16.2)
          # - SpeechAnalyzer: macOS 26 deployment target
          # - Qwen3/Voxtral/Granite/Gemma4: macOS 14 + embed Swift compat libs (MLX uses Swift 6.2 features)
          # - All others: macOS 14, no compat libs needed (simple Foundation/SDK code)
          EMBED_SWIFT_LIBS="NO"
          XCODE_VERSION="26.2"
          if [ "$TARGET" = "SpeechAnalyzerPlugin" ]; then
            DEPLOY_TARGET="26.0"
          elif [ "$TARGET" = "Qwen3Plugin" ] || [ "$TARGET" = "VoxtralPlugin" ] || [ "$TARGET" = "GranitePlugin" ] || [ "$TARGET" = "Gemma4Plugin" ]; then
            DEPLOY_TARGET="14.0"
            EMBED_SWIFT_LIBS="YES"
          else
            DEPLOY_TARGET="14.0"
          fi
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "DEPLOY_TARGET=$DEPLOY_TARGET" >> $GITHUB_ENV
          echo "XCODE_VERSION=$XCODE_VERSION" >> $GITHUB_ENV
          echo "EMBED_SWIFT_LIBS=$EMBED_SWIFT_LIBS" >> $GITHUB_ENV
          echo "Target: $TARGET (macOS $DEPLOY_TARGET, Xcode $XCODE_VERSION, embed=$EMBED_SWIFT_LIBS)"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TypeWhisper.xcodeproj \
            -scheme TypeWhisper

      - name: Patch manifest version
        run: |
          # Find the manifest.json for this plugin target
          MANIFEST=$(find Plugins -name manifest.json -path "*${TARGET}*" 2>/dev/null | head -1)
          if [ -z "$MANIFEST" ]; then
            # Fallback: search by plugin name
            MANIFEST=$(find Plugins -name manifest.json | head -1)
          fi
          if [ -n "$MANIFEST" ]; then
            python3 -c "
          import json
          with open('$MANIFEST', 'r') as f:
              m = json.load(f)
          m['version'] = '$PLUGIN_VERSION'
          with open('$MANIFEST', 'w') as f:
              json.dump(m, f, indent=4)
              f.write('\n')
          "
            echo "Patched $MANIFEST to version $PLUGIN_VERSION"
            cat "$MANIFEST"
          else
            echo "Warning: No manifest.json found"
          fi

      - name: Build Plugin
        run: |
          EXTRA_SETTINGS=""
          if [ "$EMBED_SWIFT_LIBS" = "YES" ]; then
            # Embed Swift compat libs (libswiftCompatibilitySpan.dylib) in plugin bundle
            # and add @loader_path/../Frameworks to rpath so they are found on macOS 15
            EXTRA_SETTINGS="ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES LD_RUNPATH_SEARCH_PATHS=@loader_path/../Frameworks"
          fi
          xcodebuild -project TypeWhisper.xcodeproj \
            -target "$TARGET" \
            -configuration Release \
            SYMROOT="$(pwd)/build" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=2D8ALY3LCL \
            MACOSX_DEPLOYMENT_TARGET="$DEPLOY_TARGET" \
            MARKETING_VERSION="$PLUGIN_VERSION" \
            $EXTRA_SETTINGS

      - name: Import Signing Certificate
        env:
          MACOS_SIGNING_P12: ${{ secrets.MACOS_SIGNING_P12 }}
          MACOS_SIGNING_PASSWORD: ${{ secrets.MACOS_SIGNING_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/plugin-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$MACOS_SIGNING_P12" | base64 --decode > /tmp/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_SIGNING_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Sign Plugin
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          BUNDLE_PATH="build/Release/${TARGET}.bundle"
          find "$BUNDLE_PATH" -name '._*' -delete
          xattr -cr "$BUNDLE_PATH"
          codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_SIGNING_IDENTITY" \
            "$BUNDLE_PATH"
          codesign --verify --deep --strict --verbose=2 "$BUNDLE_PATH"

      - name: Create ZIP
        run: |
          cd build/Release
          ditto -c -k --keepParent "${TARGET}.bundle" "${TARGET}.zip"
          ZIP_SIZE=$(stat -f%z "${TARGET}.zip")
          echo "ZIP_SIZE=$ZIP_SIZE" >> $GITHUB_ENV
          echo "ZIP size: $ZIP_SIZE bytes"

      - name: Cleanup Signing Assets
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f /tmp/cert.p12

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET="build/Release/${TARGET}.zip"

          gh release create "$TAG" "$ASSET" \
            --target "$GITHUB_SHA" \
            --title "${TARGET} v${PLUGIN_VERSION}" \
            --notes ""

      - name: Update Plugin Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOWNLOAD_URL="https://github.com/TypeWhisper/typewhisper-mac/releases/download/${TAG}/${TARGET}.zip"
          MANIFEST_PATH=$(find Plugins -name manifest.json -path "*${TARGET}*" 2>/dev/null | head -1)
          TARGET_REGISTRY=$(python3 << PYEOF
          import json, os

          manifest_path = "$MANIFEST_PATH"
          src_manifest = os.path.join("$GITHUB_WORKSPACE", manifest_path) if manifest_path else ""
          if not src_manifest or not os.path.exists(src_manifest):
              print("")
          else:
              with open(src_manifest) as mf:
                  manifest = json.load(mf)
              sdk_compat = manifest.get("sdkCompatibilityVersion")
              print(f"plugins-{sdk_compat}.json" if sdk_compat else "plugins.json")
          PYEOF
          )

          if [ -z "$TARGET_REGISTRY" ]; then
            echo "Warning: No manifest found for ${TARGET}; skipping registry update"
            exit 0
          fi

          export TARGET_REGISTRY
          echo "Updating registry file: $TARGET_REGISTRY"

          git fetch origin gh-pages
          git worktree add -B gh-pages /tmp/gh-pages origin/gh-pages

          update_registry() {
            cd /tmp/gh-pages
            git fetch origin gh-pages
            git reset --hard origin/gh-pages

            python3 << PYEOF
          import json, os, re, sys, tempfile

          target_registry = os.environ["TARGET_REGISTRY"]
          target_path = os.path.join("/tmp/gh-pages", target_registry)
          if os.path.exists(target_path):
              with open(target_path, "r") as f:
                  registry = json.load(f)
          else:
              registry = {
                  "schemaVersion": 1,
                  "plugins": []
              }

          version = "$PLUGIN_VERSION"
          size = int("$ZIP_SIZE")
          download_url = "$DOWNLOAD_URL"
          manifest_path = "$MANIFEST_PATH"
          src_manifest = os.path.join("$GITHUB_WORKSPACE", manifest_path) if manifest_path else ""

          if not src_manifest or not os.path.exists(src_manifest):
              print(f"Warning: No manifest found at {src_manifest}")
              sys.exit(0)

          with open(src_manifest) as mf:
              manifest = json.load(mf)

          registry.setdefault("schemaVersion", 1)

          # Semver-tolerant version sort key. Accepts "1.2.3", "1.2.3-beta.4",
          # "1.2.3+build.5" etc. Pre-release tags sort before matching release
          # versions (1.2.3-rc < 1.2.3). See release review M8.
          _numeric_part = re.compile(r"(\d+)")
          def version_key(value):
              core, _, pre = str(value).partition("-")
              core = core.split("+", 1)[0]
              core_tuple = tuple(int(p) if p.isdigit() else 0 for p in core.split("."))
              if not pre:
                  # No pre-release: rank higher than any pre-release of same core.
                  return (core_tuple, 1, ())
              # Pre-release: split tokens; numeric tokens sort before alpha.
              pre_tokens = []
              for token in pre.replace("+", ".").split("."):
                  if token.isdigit():
                      pre_tokens.append((0, int(token)))
                  else:
                      pre_tokens.append((1, token))
              return (core_tuple, 0, tuple(pre_tokens))

          def sync_plugin_metadata(plugin):
              plugin["id"] = manifest["id"]
              plugin["name"] = manifest["name"]
              plugin["author"] = manifest.get("author", plugin.get("author", "TypeWhisper"))
              plugin["description"] = manifest.get("description", plugin.get("description", ""))
              plugin["descriptions"] = manifest.get("descriptions", plugin.get("descriptions", {}))
              plugin["category"] = manifest.get("category", plugin.get("category", "utility"))
              plugin["downloadCount"] = plugin.get("downloadCount", 0)

              for field in ["iconSystemName", "requiresAPIKey", "hosting"]:
                  if field in manifest and manifest[field] is not None:
                      plugin[field] = manifest[field]
                  else:
                      plugin.pop(field, None)

          def build_release():
              release = {
                  "version": version,
                  "minHostVersion": manifest.get("minHostVersion", "0.9.0"),
                  "sdkCompatibilityVersion": manifest.get("sdkCompatibilityVersion"),
                  "size": size,
                  "downloadURL": download_url,
              }
              for field in ["minOSVersion", "supportedArchitectures"]:
                  if field in manifest and manifest[field] is not None:
                      release[field] = manifest[field]
              return release

          def migrate_legacy_release(plugin):
              if plugin.get("releases"):
                  return plugin["releases"]

              version_value = plugin.get("version")
              min_host = plugin.get("minHostVersion")
              sdk_compat = plugin.get("sdkCompatibilityVersion")
              size_value = plugin.get("size")
              download_value = plugin.get("downloadURL")
              if not all([version_value, min_host, size_value, download_value]):
                  return []

              legacy = {
                  "version": version_value,
                  "minHostVersion": min_host,
                  "sdkCompatibilityVersion": sdk_compat,
                  "size": size_value,
                  "downloadURL": download_value,
              }
              for field in ["minOSVersion", "supportedArchitectures"]:
                  if field in plugin and plugin[field] is not None:
                      legacy[field] = plugin[field]
              return [legacy]

          def sync_legacy_fields(plugin, release):
              plugin["version"] = release["version"]
              plugin["minHostVersion"] = release["minHostVersion"]
              if release.get("sdkCompatibilityVersion") is not None:
                  plugin["sdkCompatibilityVersion"] = release["sdkCompatibilityVersion"]
              else:
                  plugin.pop("sdkCompatibilityVersion", None)
              plugin["size"] = release["size"]
              plugin["downloadURL"] = release["downloadURL"]

              for field in ["minOSVersion", "supportedArchitectures"]:
                  if field in release and release[field] is not None:
                      plugin[field] = release[field]
                  else:
                      plugin.pop(field, None)

          updated = False
          for plugin in registry["plugins"]:
              if plugin["id"] == manifest["id"]:
                  releases = migrate_legacy_release(plugin)
                  sync_plugin_metadata(plugin)
                  releases = [release for release in releases if release.get("version") != version]
                  releases.append(build_release())
                  plugin["releases"] = sorted(releases, key=lambda release: version_key(release["version"]), reverse=True)
                  sync_legacy_fields(plugin, plugin["releases"][0])
                  updated = True
                  print(f"Updated {plugin['id']} release set with v{version}")
                  break

          if not updated:
              new_entry = {}
              sync_plugin_metadata(new_entry)
              new_entry["releases"] = [build_release()]
              sync_legacy_fields(new_entry, new_entry["releases"][0])
              registry["plugins"].append(new_entry)
              print(f"Added new plugin {manifest['id']} v{version}")

          # Atomic write: write to a temp file in the same directory, fsync,
          # then rename into place. Prevents a half-written registry file from
          # ending up on gh-pages if the job is killed mid-write and keeps
          # concurrent readers consistent.
          target_dir = os.path.dirname(target_path)
          fd, tmp_path = tempfile.mkstemp(prefix=f"{target_registry}.", dir=target_dir)
          try:
              with os.fdopen(fd, "w") as f:
                  json.dump(registry, f, indent=2)
                  f.write("\n")
                  f.flush()
                  os.fsync(f.fileno())
              os.replace(tmp_path, target_path)
          except Exception:
              try:
                  os.unlink(tmp_path)
              except OSError:
                  pass
              raise
          PYEOF

            git add "$TARGET_REGISTRY"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git diff --cached --quiet || git commit -m "Update ${TARGET} to v${PLUGIN_VERSION} in ${TARGET_REGISTRY}"
            git push origin gh-pages
          }

          # Retry up to 5 times to handle concurrent pushes
          for i in 1 2 3 4 5; do
            if update_registry; then
              echo "Successfully updated ${TARGET_REGISTRY} (attempt $i)"
              break
            fi
            echo "Push failed (attempt $i), retrying in ${i}s..."
            sleep "$i"
          done
